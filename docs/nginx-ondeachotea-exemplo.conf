# Exemplo Nginx (Ubuntu) — ondeachotea.com
# Copiar trechos para /etc/nginx/sites-available/ e ajustar caminhos dos certificados após:
#   sudo certbot certonly --nginx -d ondeachotea.com -d www.ondeachotea.com
#   sudo certbot certonly --nginx -d api.ondeachotea.com
#   sudo certbot certonly --nginx -d admin.ondeachotea.com
#
# Depois: sudo nginx -t && sudo systemctl reload nginx

# --- Site público (Next apps/web :3002) ---
server {
  listen 443 ssl http2;
  server_name ondeachotea.com www.ondeachotea.com;

  ssl_certificate     /etc/letsencrypt/live/ondeachotea.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ondeachotea.com/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:3002;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# --- API (Nest :3000) — obrigatório para https://api.ondeachotea.com ---
server {
  listen 443 ssl http2;
  server_name api.ondeachotea.com;

  ssl_certificate     /etc/letsencrypt/live/api.ondeachotea.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.ondeachotea.com/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# --- Admin (Next apps/admin :3001) ---
server {
  listen 443 ssl http2;
  server_name admin.ondeachotea.com;

  ssl_certificate     /etc/letsencrypt/live/admin.ondeachotea.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/admin.ondeachotea.com/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# HTTP → HTTPS (exemplo mínimo; pode usar redirecionos do certbot)
server {
  listen 80;
  server_name ondeachotea.com www.ondeachotea.com api.ondeachotea.com admin.ondeachotea.com;
  return 301 https://$host$request_uri;
}
