name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Lint backend
        run: npm run lint:backend

      - name: Lint admin
        run: npm run lint:admin

  mobile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get
        working-directory: apps/mobile

      - name: Flutter analyze
        run: flutter analyze
        working-directory: apps/mobile
