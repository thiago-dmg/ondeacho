# Deploy do painel Next.js (apps/admin) para a mesma VPS da API — releases + systemd.
# Requer os mesmos secrets SSH da API: VPS_SSH_HOST, VPS_SSH_USER, VPS_SSH_KEY
#
# URL da API no build (NEXT_PUBLIC_*):
#   1) Repository Variable ou Organization Variable: NEXT_PUBLIC_API_URL (vars.NEXT_PUBLIC_API_URL)
#   2) Ou Secret com o mesmo nome (secrets.NEXT_PUBLIC_API_URL) — comum quando se cria em "Secrets"
#   3) workflow_dispatch: campo opcional "next_public_api_url"
#   4) Fallback (último recurso): DEFAULT_NEXT_PUBLIC_API_URL abaixo
#
# Nota: "Repository variables" ficam em Settings → Actions → Variables (aba Variables, não Secrets).
# Se a URL foi criada como Secret, use secrets.NEXT_PUBLIC_API_URL — o step "Resolve" tenta os dois.
name: Deploy Admin to VPS

on:
  push:
    branches: ["main", "master"]
    paths:
      - "apps/admin/**"
      - ".github/workflows/deploy-admin-vps.yml"
  workflow_dispatch:
    inputs:
      next_public_api_url:
        description: "Sobrescreve a URL da API (opcional). Ex.: http://IP:3000/api/v1"
        required: false
        type: string
        default: ""

env:
  SERVICE_NAME: ondeacho-admin
  REMOTE_DIR: /var/www/ondeacho-admin
  ADMIN_PORT: 3001
  # Usado só se vars, secrets e input estiverem vazios (URL pública).
  DEFAULT_NEXT_PUBLIC_API_URL: http://72.61.35.190:3000/api/v1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve NEXT_PUBLIC_API_URL
        id: resolve_api
        env:
          # Repositório / org (aba Variables)
          FROM_VARS: ${{ vars.NEXT_PUBLIC_API_URL }}
          # Muitos times colocam a URL em Secrets com o mesmo nome
          FROM_SECRETS: ${{ secrets.NEXT_PUBLIC_API_URL }}
          # Dispatch manual (opcional)
          FROM_INPUT: ${{ github.event.inputs.next_public_api_url || '' }}
          FALLBACK: ${{ env.DEFAULT_NEXT_PUBLIC_API_URL }}
        run: |
          set -euo pipefail
          VAL=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${FROM_INPUT:-}" ]; then
            VAL="${FROM_INPUT}"
            SRC="workflow_dispatch input"
          elif [ -n "${FROM_VARS:-}" ]; then
            VAL="${FROM_VARS}"
            SRC="vars.NEXT_PUBLIC_API_URL"
          elif [ -n "${FROM_SECRETS:-}" ]; then
            VAL="${FROM_SECRETS}"
            SRC="secrets.NEXT_PUBLIC_API_URL"
          elif [ -n "${FALLBACK:-}" ]; then
            VAL="${FALLBACK}"
            SRC="DEFAULT_NEXT_PUBLIC_API_URL (fallback do workflow)"
          fi

          if [ -z "${VAL:-}" ]; then
            echo "::error::Não foi possível obter NEXT_PUBLIC_API_URL. Crie em Settings → Actions → Variables OU Secrets com o nome NEXT_PUBLIC_API_URL, ou use o dispatch com o campo opcional."
            exit 1
          fi

          {
            echo "NEXT_PUBLIC_API_URL=${VAL}"
          } >> "$GITHUB_ENV"

          LEN=${#VAL}
          echo "::notice::NEXT_PUBLIC_API_URL carregada via ${SRC} (comprimento=${LEN})"
          echo "resolved_source=${SRC}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build admin
        env:
          NODE_ENV: production
        run: npm run build --workspace apps/admin

      - name: Prune devDependencies
        run: npm prune --omit=dev

      - name: Package release
        run: |
          set -e
          mkdir -p pkg/apps/admin
          cp package.json package-lock.json pkg/
          cp -r node_modules pkg/
          cp apps/admin/package.json pkg/apps/admin/
          cp -r apps/admin/.next-build pkg/apps/admin/
          tar -czf ondeacho-admin.tar.gz -C pkg .

      - name: Prepare systemd service
        run: |
          cat > ondeacho-admin.service <<EOF
          [Unit]
          Description=OndeAcho Admin (Next.js)
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=${{ env.REMOTE_DIR }}/current/apps/admin
          ExecStart=/usr/bin/node ../../node_modules/next/dist/bin/next start -p ${{ env.ADMIN_PORT }}
          Restart=always
          RestartSec=5
          KillSignal=SIGINT
          SyslogIdentifier=ondeacho-admin
          Environment=NODE_ENV=production

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Upload package to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "ondeacho-admin.tar.gz,ondeacho-admin.service"
          target: "/tmp/deploy-admin-${{ github.run_id }}"
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e

            SERVICE_NAME="${{ env.SERVICE_NAME }}"
            REMOTE_DIR="${{ env.REMOTE_DIR }}"
            RUN_DIR="/tmp/deploy-admin-${{ github.run_id }}"
            TAR="$RUN_DIR/ondeacho-admin.tar.gz"
            COMMIT="${{ github.sha }}"
            ADMIN_PORT="${{ env.ADMIN_PORT }}"

            echo "Criando estrutura de pastas..."
            sudo mkdir -p "$REMOTE_DIR/releases"

            RELEASE_DIR="$REMOTE_DIR/releases/$COMMIT"
            sudo rm -rf "$RELEASE_DIR"
            sudo mkdir -p "$RELEASE_DIR"

            echo "Extraindo nova versão..."
            sudo tar -xzf "$TAR" -C "$RELEASE_DIR"

            echo "Validando artefato publicado..."
            test -f "$RELEASE_DIR/apps/admin/.next-build/BUILD_ID"
            test -f "$RELEASE_DIR/node_modules/next/dist/bin/next"

            echo "Atualizando symlink current..."
            sudo ln -sfn "$RELEASE_DIR" "$REMOTE_DIR/current"

            echo "Atualizando serviço systemd..."
            sudo cp "$RUN_DIR/ondeacho-admin.service" "/etc/systemd/system/$SERVICE_NAME.service"

            echo "Recarregando systemd..."
            sudo systemctl daemon-reload
            sudo systemctl enable "$SERVICE_NAME"
            sudo systemctl restart "$SERVICE_NAME"

            echo "Aguardando aplicação subir..."
            sleep 10

            echo "Status do serviço:"
            sudo systemctl status "$SERVICE_NAME" --no-pager -l

            echo "Testando HTTP local..."
            curl -fsS -o /dev/null "http://127.0.0.1:${ADMIN_PORT}/" || {
              echo "::warning::curl na raiz falhou; verifique logs: journalctl -u $SERVICE_NAME -n 50"
              exit 1
            }

            echo "Deploy do admin concluído com sucesso"
