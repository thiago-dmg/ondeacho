# Deploy da API NestJS (OndeAcho) para VPS via SSH — mesmo padrão do BibleReader (releases + systemd).
# Secrets no GitHub (Settings → Secrets → Actions): VPS_SSH_HOST, VPS_SSH_USER, VPS_SSH_KEY
name: Deploy API to VPS

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  SERVICE_NAME: ondeacho-api
  REMOTE_DIR: /var/www/ondeacho-api
  API_PORT: 3000

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build --workspace apps/backend

      - name: Prune devDependencies
        run: npm prune --omit=dev

      - name: Package release
        run: |
          set -e
          mkdir -p pkg/apps/backend
          cp package.json package-lock.json pkg/
          cp -r node_modules pkg/
          cp apps/backend/package.json pkg/apps/backend/
          cp -r apps/backend/dist pkg/apps/backend/
          tar -czf ondeacho-api.tar.gz -C pkg .

      - name: Prepare systemd service
        run: |
          cat > ondeacho-api.service <<EOF
          [Unit]
          Description=OndeAcho API (Node.js / NestJS)
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=${{ env.REMOTE_DIR }}/current
          ExecStart=/usr/bin/node apps/backend/dist/main.js
          Restart=always
          RestartSec=5
          KillSignal=SIGINT
          SyslogIdentifier=ondeacho-api
          Environment=NODE_ENV=production
          EnvironmentFile=/etc/ondeacho-api.env

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Upload package to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "ondeacho-api.tar.gz,ondeacho-api.service"
          target: "/tmp/deploy-${{ github.run_id }}"
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e

            SERVICE_NAME="${{ env.SERVICE_NAME }}"
            REMOTE_DIR="${{ env.REMOTE_DIR }}"
            RUN_DIR="/tmp/deploy-${{ github.run_id }}"
            TAR="$RUN_DIR/ondeacho-api.tar.gz"
            COMMIT="${{ github.sha }}"
            echo "Criando estrutura de pastas..."
            sudo mkdir -p "$REMOTE_DIR/releases"

            RELEASE_DIR="$REMOTE_DIR/releases/$COMMIT"
            sudo rm -rf "$RELEASE_DIR"
            sudo mkdir -p "$RELEASE_DIR"

            echo "Extraindo nova versão..."
            sudo tar -xzf "$TAR" -C "$RELEASE_DIR"

            echo "Validando artefato publicado..."
            test -f "$RELEASE_DIR/apps/backend/dist/main.js"

            echo "Atualizando symlink current..."
            sudo ln -sfn "$RELEASE_DIR" "$REMOTE_DIR/current"

            echo "Atualizando serviço systemd..."
            sudo cp "$RUN_DIR/ondeacho-api.service" "/etc/systemd/system/$SERVICE_NAME.service"

            echo "Validando arquivo de ambiente..."
            sudo test -f /etc/ondeacho-api.env

            echo "Recarregando systemd..."
            sudo systemctl daemon-reload
            sudo systemctl enable "$SERVICE_NAME"
            sudo systemctl restart "$SERVICE_NAME"

            echo "Aguardando aplicação subir..."
            sleep 8

            echo "Status do serviço:"
            sudo systemctl status "$SERVICE_NAME" --no-pager -l

            echo "Testando health local..."
            API_PORT="$(grep -E '^[[:space:]]*PORT=' /etc/ondeacho-api.env | head -1 | cut -d= -f2- | tr -d '\r' | tr -d '[:space:]')"
            if [ -z "$API_PORT" ]; then API_PORT="${{ env.API_PORT }}"; fi
            curl -fsS "http://127.0.0.1:${API_PORT}/api/v1/health" > /dev/null

            echo "Deploy concluído com sucesso"
