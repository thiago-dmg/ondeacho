version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ondeacho-db-prod
    environment:
      POSTGRES_DB: ondeacho
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ondeacho_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ondeacho"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.prod
    container_name: ondeacho-backend-prod
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      JWT_SECRET: alterar_em_producao
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ondeacho
      CORS_ORIGINS: http://localhost:3001
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 120
    ports:
      - "3000:3000"

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile.prod
    container_name: ondeacho-admin-prod
    depends_on:
      - backend
    environment:
      # URL acessível no navegador (não use nome do serviço Docker aqui).
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
    ports:
      - "3001:3001"

volumes:
  ondeacho_pgdata_prod:
