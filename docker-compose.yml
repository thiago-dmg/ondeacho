version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ondeacho-db
    environment:
      POSTGRES_DB: ondeacho
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ondeacho_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ondeacho"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: ondeacho-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      JWT_SECRET: trocar_em_producao
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ondeacho
    ports:
      - "3000:3000"
    volumes:
      - ./apps/backend:/app
      - /app/node_modules

volumes:
  ondeacho_pgdata:
